spring.application.name=backend
server.port=${SERVER_PORT:${BACKEND_PORT:80}}
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:7200000}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost}

app.security.csrf.expiration-ms=${CSRF_EXPIRATION_MS:900000}
app.security.rate-limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS:5}
app.security.rate-limit.window-ms=${RATE_LIMIT_WINDOW_MS:300000}
app.security.rate-limit.block-ms=${RATE_LIMIT_BLOCK_MS:600000}

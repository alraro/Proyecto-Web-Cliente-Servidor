<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Registrar Incidencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/assignment.css">
    <script src="javascript/captain-incidents.js" defer></script>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="captain-dashboard.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Capitán</span>
            </div>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="page-header">
            <a href="captain-dashboard.html" class="back-link-inline">← Volver al panel</a>
            <div class="page-header-row">
                <div>
                    <h1>Registrar Incidencia</h1>
                    <p>Notifica incidencias ocurridas en tus tiendas.</p>
                </div>
            </div>
        </div>

        <div id="global-message" hidden></div>

        <!-- Formulario de incidencia -->
        <div class="card">
            <div class="card-head">
                <h2>Nueva incidencia</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label for="campaign-select">Campaña</label>
                    <select id="campaign-select">
                        <option value="">Selecciona una campaña...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="store-select">Tienda</label>
                    <select id="store-select" disabled>
                        <option value="">Selecciona primero una campaña...</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label for="description">Descripción de la incidencia</label>
                    <textarea id="description" rows="5" placeholder="Describe con detalle la incidencia ocurrida..."
                        style="width:100%;padding:.6rem .8rem;border:1px solid var(--border,#e0e0e0);border-radius:8px;font-family:inherit;font-size:.9rem;resize:vertical;"></textarea>
                </div>
            </div>
            <div class="card-body" style="padding-top:0">
                <button type="button" id="btn-submit" class="btn btn-primary">Enviar incidencia</button>
            </div>
        </div>

        <!-- Historial de incidencias -->
        <div class="card">
            <div class="card-head">
                <h2>Historial de incidencias</h2>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Campaña</th>
                            <th>Tienda</th>
                            <th>Descripción</th>
                        </tr>
                    </thead>
                    <tbody id="incidents-tbody">
                        <tr><td colspan="4" class="table-empty">Selecciona campaña y tienda para ver el historial.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>

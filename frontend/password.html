<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Bancosol</title>
    <link rel="stylesheet" href="password.css">
</head>
<body>

    <div class="recovery-container">

        <img src="assets/LOGO_BANCOSOL.png" alt="Logo" class="logo">
        
        <h2>Recuperar contraseña</h2>
        <p>Introduce el correo electrónico asociado a tu cuenta y te enviaremos un enlace para restablecer tu contraseña.</p>
        
        <form action="/procesar-recuperacion" method="POST">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu_correo@bancosol.info" required>
            </div>
            
            <button type="submit" class="btn-submit">Enviar enlace</button>
        </form>
        
        <a href="login.html" class="back-link">← Volver al inicio de sesión</a>
    </div>

</body>
</html>

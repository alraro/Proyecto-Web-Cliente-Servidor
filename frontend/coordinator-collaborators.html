<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Colaboradores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/assignment.css">
    <script src="javascript/coordinator-collaborators.js" defer></script>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="coordinator-dashboard.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Coordinador</span>
            </div>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="page-header">
            <a href="coordinator-dashboard.html" class="back-link-inline">← Volver al panel</a>
            <div class="page-header-row">
                <div>
                    <h1>Colaboradores</h1>
                    <p>Gestión de voluntarios y colaboradores de campaña.</p>
                </div>
            </div>
        </div>

        <div id="global-message" hidden></div>

        <!-- Filtro campaña -->
        <div class="card">
            <div class="card-body">
                <div class="form-group" style="margin-bottom:0">
                    <label for="campaign-select">Campaña</label>
                    <div class="selector-row">
                        <select id="campaign-select">
                            <option value="">Selecciona una campaña...</option>
                        </select>
                        <button type="button" id="btn-load" class="btn btn-secondary">Cargar colaboradores</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla de colaboradores -->
        <div class="card">
            <div class="card-head" style="display:flex;justify-content:space-between;align-items:center">
                <h2>Colaboradores y voluntarios</h2>
                <button type="button" id="btn-new" class="btn btn-primary" style="margin:0">+ Nuevo colaborador</button>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="collaborators-tbody">
                        <tr><td colspan="5" class="table-empty">Selecciona una campaña para ver los colaboradores.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Formulario inline para editar / crear -->
        <div class="card" id="form-card" hidden>
            <div class="card-head">
                <h2 id="form-title">Nuevo colaborador</h2>
            </div>
            <div class="card-body">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-name">Nombre</label>
                    <input type="text" id="edit-name" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label for="edit-phone">Teléfono</label>
                    <input type="text" id="edit-phone" placeholder="Teléfono de contacto">
                </div>
                <div class="form-group">
                    <label for="edit-email">Email</label>
                    <input type="email" id="edit-email" placeholder="email@ejemplo.com">
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label for="edit-address">Dirección</label>
                    <input type="text" id="edit-address" placeholder="Dirección (opcional)">
                </div>
            </div>
            <div class="card-body" style="padding-top:0;display:flex;gap:.5rem">
                <button type="button" id="btn-save" class="btn btn-primary">Guardar</button>
                <button type="button" id="btn-cancel-form" class="btn btn-secondary">Cancelar</button>
            </div>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Mis Campañas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <script src="javascript/coordinator-campaigns.js" defer></script>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="coordinator-dashboard.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Coordinador</span>
            </div>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="page-header">
            <a href="coordinator-dashboard.html" class="back-link-inline">← Volver al panel</a>
            <div class="page-header-row">
                <div>
                    <h1>Mis Campañas</h1>
                    <p>Campañas en las que participas como coordinador.</p>
                </div>
            </div>
        </div>

        <div id="global-message" hidden></div>

        <div class="card">
            <div class="card-head">
                <h2>Campañas asignadas</h2>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Tipo</th>
                            <th>Fecha inicio</th>
                            <th>Fecha fin</th>
                        </tr>
                    </thead>
                    <tbody id="campaigns-tbody">
                        <tr><td colspan="4" class="table-empty">Cargando campañas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Mi Tienda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsible-store.css">
</head>
<body>

    <header class="topbar">
        <a class="brand" href="index.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Responsable</span>
            </div>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="page-header">
            <h1>Mi tienda</h1>
            <p>Información de tu tienda asignada y turnos programados.</p>
        </div>

        <div class="card hidden" id="card-tienda">
            <div class="card-header"><h2 id="store-title">Cargando...</h2></div>
            <div class="info-grid" id="info-grid"></div>
        </div>

        <div class="card hidden" id="card-turnos">
            <div class="card-header"><h2>Turnos programados</h2></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Campaña</th>
                            <th>Voluntario</th>
                            <th>Hora fin</th>
                            <th>Asistencia</th>
                            <th>Notas</th>
                        </tr>
                    </thead>
                    <tbody id="shifts-tbody">
                        <tr><td colspan="5" class="table-empty">Cargando turnos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="error-msg" class="error-panel hidden"></div>
    </main>

    <script src="javascript/responsible-store.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Administrador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/administrador.css">
</head>
<body>

    <!-- TOPBAR -->
    <header class="topbar">
        <a class="brand" href="index.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Administrador</span>
            </div>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="page-wrapper">
        <div class="page-header">
            <a href="administrador.html" style="display:inline-flex;align-items:center;gap:0.4rem;font-size:0.88rem;font-weight:700;color:#2d65a0;text-decoration:none;margin-bottom:1rem;">← Volver al menú</a>
            <h1>Cadenas de supermercados</h1>
            <p>Gestión de cadenas de supermercados participantes en las campañas.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Cadenas</h2>
                <div class="card-actions">
                    <button class="btn btn-primary" id="btn-nueva-cadena">+ Nueva cadena</button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Participación</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="chains-tbody">
                        <tr><td colspan="5" class="table-empty">Cargando cadenas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL CREAR / EDITAR -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h3 id="modal-title">Nueva cadena</h3>
            <div class="form-group">
                <label for="input-nombre">Nombre</label>
                <input type="text" id="input-nombre" placeholder="Ej: MERCADONA" maxlength="255">
            </div>
            <div class="form-group">
                <label for="input-codigo">Código</label>
                <input type="text" id="input-codigo" placeholder="Ej: MERCADONA" maxlength="50">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="input-participacion">
                <label for="input-participacion">Participa activamente en campañas</label>
            </div>
            <p class="form-message" id="modal-error"></p>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-modal-cancel">Cancelar</button>
                <button class="btn btn-primary" id="btn-modal-save">Guardar</button>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        const BACKEND = 'http://localhost:8080';

        // ── Auth ──────────────────────────────────────────────────────────────
        function getToken() { return localStorage.getItem('token'); }
        function getUser()  { return localStorage.getItem('nombre') || 'Administrador'; }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + getToken()
            };
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Si no hay token, redirigir al login
        if (!getToken()) { window.location.href = 'login.html'; }

        document.getElementById('user-name').textContent = getUser();
        document.getElementById('btn-logout').addEventListener('click', logout);

        // ── Toast ─────────────────────────────────────────────────────────────
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // ── Render tabla ──────────────────────────────────────────────────────
        function renderTable(chains) {
            const tbody = document.getElementById('chains-tbody');
            if (!chains.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No hay cadenas registradas.</td></tr>';
                return;
            }
            tbody.innerHTML = chains.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td><strong>${c.nombre}</strong></td>
                    <td><code>${c.codigo}</code></td>
                    <td>
                        <span class="badge ${c.participacion ? 'badge-yes' : 'badge-no'}">
                            ${c.participacion ? '✓ Sí' : '— No'}
                        </span>
                    </td>
                    <td>
                        <div class="td-actions">
                            <button class="btn btn-edit btn-sm" onclick="openEdit(${c.id}, '${escHtml(c.nombre)}', '${escHtml(c.codigo)}', ${c.participacion})">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCadena(${c.id}, '${escHtml(c.nombre)}')">Eliminar</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function escHtml(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // ── Cargar cadenas ────────────────────────────────────────────────────
        async function loadChains() {
            try {
                const res = await fetch(BACKEND + '/api/chains', { headers: authHeaders() });
                if (res.status === 403) { logout(); return; }
                const data = await res.json();
                renderTable(data);
            } catch {
                document.getElementById('chains-tbody').innerHTML =
                    '<tr><td colspan="5" class="table-empty">Error al conectar con el servidor.</td></tr>';
            }
        }

        // ── Modal ─────────────────────────────────────────────────────────────
        let editingId = null;

        function openModal(title) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-error').textContent = '';
            document.getElementById('modal-backdrop').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modal-backdrop').classList.remove('open');
            document.getElementById('input-nombre').value = '';
            document.getElementById('input-codigo').value = '';
            document.getElementById('input-participacion').checked = false;
            document.getElementById('modal-error').textContent = '';
            editingId = null;
        }

        function openCreate() {
            editingId = null;
            openModal('Nueva cadena');
        }

        function openEdit(id, nombre, codigo, participacion) {
            editingId = id;
            document.getElementById('input-nombre').value = nombre;
            document.getElementById('input-codigo').value = codigo;
            document.getElementById('input-participacion').checked = participacion;
            openModal('Editar cadena');
        }

        document.getElementById('btn-nueva-cadena').addEventListener('click', openCreate);
        document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-backdrop').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-backdrop')) closeModal();
        });

        // ── Guardar (crear o editar) ───────────────────────────────────────────
        document.getElementById('btn-modal-save').addEventListener('click', async () => {
            const nombre = document.getElementById('input-nombre').value.trim();
            const codigo = document.getElementById('input-codigo').value.trim();
            const participacion = document.getElementById('input-participacion').checked;
            const errorEl = document.getElementById('modal-error');

            if (!nombre || !codigo) {
                errorEl.textContent = 'Nombre y código son obligatorios.';
                return;
            }

            const body = JSON.stringify({ nombre, codigo, participacion });
            const url  = editingId ? `${BACKEND}/api/chains/${editingId}` : `${BACKEND}/api/chains`;
            const method = editingId ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method, headers: authHeaders(), body });
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.message || 'Error al guardar.';
                    return;
                }

                closeModal();
                showToast(editingId ? 'Cadena actualizada.' : 'Cadena creada.');
                loadChains();
            } catch {
                errorEl.textContent = 'Error de conexión con el servidor.';
            }
        });

        // ── Eliminar ──────────────────────────────────────────────────────────
        async function deleteCadena(id, nombre) {
            if (!confirm(`¿Eliminar la cadena "${nombre}"? Esta acción no se puede deshacer.`)) return;

            try {
                const res = await fetch(`${BACKEND}/api/chains/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (!res.ok) {
                    const data = await res.json();
                    showToast(data.message || 'Error al eliminar.', 'error');
                    return;
                }

                showToast('Cadena eliminada.');
                loadChains();
            } catch {
                showToast('Error de conexión con el servidor.', 'error');
            }
        }

        // ── Init ──────────────────────────────────────────────────────────────
        loadChains();
    </script>
</body>
</html>

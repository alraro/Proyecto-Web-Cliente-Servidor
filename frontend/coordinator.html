<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Gestión de Coordinadores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <script src="javascript/coordinator.js" defer></script>
    <style>
        /* ── Padding interior de tarjetas ──────────────────────────────────── */
        .card-body {
            padding: 1.5rem;
        }

        /* ── Cabecera de tarjeta con título ────────────────────────────────── */
        .card-head {
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .card-head h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--blue-900);
            margin: 0;
        }

        /* ── Fila selector campaña + botón ────────────────────────────────── */
        .selector-row {
            display: flex;
            gap: .75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: .6rem;
        }
        .selector-row select {
            flex: 1;
            min-width: 220px;
            padding: .65rem 1rem;
            border: 1px solid rgba(25,58,107,.18);
            border-radius: var(--radius-sm);
            font: inherit;
            font-size: .93rem;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .selector-row select:focus {
            border-color: var(--blue-700);
            box-shadow: 0 0 0 3px rgba(45,101,160,.14);
        }

        /* ── Espacio entre tarjetas ────────────────────────────────────────── */
        .card + .card {
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>

<header class="topbar">
    <a class="brand" href="index.html">
        <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
    </a>
    <div class="topbar-right">
        <div class="user-badge">
            <span class="dot"></span>
            <span id="user-name">Administrador</span>
        </div>
        <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
</header>

<main class="page-wrapper">
    <div class="page-header">
        <a href="admin.html" class="back-link-inline">← Volver al panel</a>
        <div class="page-header-row">
            <div>
                <h1>Gestión de Coordinadores</h1>
                <p>Asigna coordinadores a campañas de recogida.</p>
            </div>
        </div>
    </div>

    <div id="global-message" hidden></div>

    <!-- Selector de campaña -->
    <div class="card">
        <div class="card-body">
            <div class="form-group" style="margin-bottom:0">
                <label for="campaign-select">Campaña</label>
                <div class="selector-row">
                    <select id="campaign-select">
                        <option value="">Selecciona una campaña...</option>
                    </select>
                    <button type="button" id="btn-load" class="btn btn-secondary">Cargar coordinadores</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Coordinadores asignados -->
    <div class="card">
        <div class="card-head">
            <h2>Coordinadores asignados</h2>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="coordinators-tbody">
                    <tr><td colspan="3" class="table-empty">Selecciona una campaña para ver los coordinadores asignados.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Añadir coordinador -->
    <div class="card">
        <div class="card-body">
            <div class="form-group" style="margin-bottom:0">
                <label for="coordinator-select">Añadir coordinador</label>
                <div class="selector-row">
                    <select id="coordinator-select">
                        <option value="">Selecciona un coordinador...</option>
                    </select>
                    <button type="button" id="btn-assign" class="btn btn-primary">Asignar</button>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>

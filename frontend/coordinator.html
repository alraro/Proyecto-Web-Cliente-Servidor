<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Panel de Coordinador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/coordinator.css">
    <script src="javascript/coordinator.js" defer></script>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Coordinador</span>
            </div>
            <button class="btn-edit" id="btn-edit">Editar perfil</button>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="welcome-bar">
            <div>
                <h2>Gestión de Turnos y Asignaciones 👋</h2>
                <p>Desde aquí puedes crear turnos y asignar voluntarios a las campañas.</p>
            </div>
            <span class="role-pill">Coordinador</span>
        </div>

        <div id="alert-container"></div>

        <section class="assignment-section">
            <h3 class="section-title">Crear nuevo turno de recogida</h3>
            <form id="shift-form" class="assignment-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="campaign-select">Campaña *</label>
                        <select id="campaign-select" required>
                            <option value="">Selecciona una campaña</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="store-select">Tienda *</label>
                        <select id="store-select" required disabled>
                            <option value="">Selecciona una tienda</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="shift-day">Día del turno *</label>
                        <input type="date" id="shift-day" required>
                    </div>
                    <div class="form-group">
                        <label for="volunteers-needed">Nº Voluntarios necesarios *</label>
                        <input type="number" id="volunteers-needed" min="1" value="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start-time">Hora de inicio *</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label for="end-time">Hora de fin *</label>
                        <input type="time" id="end-time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Ubicación específica</label>
                    <input type="text" id="location" placeholder="Ej: Entrada principal..." maxlength="500">
                </div>

                <button type="submit" class="btn-primary" id="btn-create-shift">Crear turno</button>
            </form>
        </section>

        <section class="assignment-section">
            <h3 class="section-title">Asignar Voluntario a Turno Existente</h3>
            <form id="volunteer-assignment-form" class="assignment-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="shift-assign-select">Turno *</label>
                        <select id="shift-assign-select" required disabled>
                            <option value="">Selecciona primero una campaña</option>
                        </select>
                    </div>
                    <div class="form-group volunteer-count">
                        <label>Voluntarios asignados / necesarios</label>
                        <span id="current-volunteer-count" class="count-display">-- / --</span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="volunteer-select">Voluntario *</label>
                        <select id="volunteer-select" required disabled>
                            <option value="">Seleccionar voluntario...</option>
                        </select>
                    </div>
                </div>
                <div id="assignment-message" class="form-message"></div>
                <button type="submit" class="btn-primary">Asignar Voluntario</button>
            </form>
        </section>

        <div class="shifts-list-card">
            <div class="shifts-list-header">
                <h3>Turnos Actuales</h3>
                <button class="btn-refresh" id="btn-refresh-shifts">Actualizar</button>
            </div>
            <div id="shifts-container">
                <p class="empty-message">Selecciona una campaña para ver los turnos.</p>
            </div>
        </div>
    </main>
</body>
</html>

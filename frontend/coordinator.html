<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Panel de Coordinador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/coordinator.css">
    <script src="javascript/coordinator.js" defer></script>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Coordinador</span>
            </div>
            <button class="btn-edit" id="btn-edit">Editar perfil</button>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="welcome-bar">
            <div>
                <h2>Bienvenido, <span id="welcome-name">Coordinador</span> 👋</h2>
                <p>Desde aquí puedes gestionar los turnos de recogida de alimentos de las campañas.</p>
            </div>
            <span class="role-pill">📋 Coordinador</span>
        </div>

        <p class="section-title">Gestión de Turnos</p>
        
        <!-- Formulario para crear turno -->
        <div class="form-card">
            <h3>Crear nuevo turno de recogida</h3>
            <form id="shift-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="campaign-select">Campaña *</label>
                        <select id="campaign-select" required>
                            <option value="">Selecciona una campaña</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="store-select">Tienda *</label>
                        <select id="store-select" required disabled>
                            <option value="">Selecciona una tienda</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="shift-day">Día del turno *</label>
                        <input type="date" id="shift-day" required>
                    </div>
                    <div class="form-group">
                        <label for="volunteers-needed">Nº Voluntarios necesarios *</label>
                        <input type="number" id="volunteers-needed" min="1" value="1" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start-time">Hora de inicio *</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label for="end-time">Hora de fin *</label>
                        <input type="time" id="end-time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Ubicación específica</label>
                    <input type="text" id="location" placeholder="Ej: Entrada principal, calle lateral..." maxlength="500">
                </div>

                <div class="form-group">
                    <label for="observations">Observaciones</label>
                    <textarea id="observations" rows="3" placeholder="Notas adicionales para el turno..." maxlength="1000"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="btn-create-shift">Crear turno</button>
                    <button type="reset" class="btn-secondary">Limpiar formulario</button>
                </div>
            </form>
            <div id="form-message" class="form-message"></div>
        </div>

        <!-- Lista de turnos -->
        <div class="shifts-list-card">
            <div class="shifts-list-header">
                <h3>Turnos de la campaña</h3>
                <button class="btn-refresh" id="btn-refresh-shifts">🔄 Actualizar</button>
            </div>
            <div id="shifts-container">
                <p class="empty-message">Selecciona una campaña para ver los turnos.</p>
            </div>
        </div>
    </main>

    <!-- Modal para editar perfil -->
    <div id="profile-modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close" id="close-profile-modal">&times;</span>
            <h3>Editar perfil</h3>
            <form id="profile-form">
                <div class="form-group">
                    <label for="profile-name">Nombre</label>
                    <input type="text" id="profile-name" required>
                </div>
                <div class="form-group">
                    <label for="profile-email">Email</label>
                    <input type="email" id="profile-email" required>
                </div>
                <div class="form-group">
                    <label for="profile-phone">Teléfono</label>
                    <input type="tel" id="profile-phone">
                </div>
                <div class="form-group">
                    <label for="profile-address">Domicilio</label>
                    <input type="text" id="profile-address">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar cambios</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

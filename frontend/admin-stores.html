<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Tiendas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <header class="topbar">
        <a class="brand" href="index.html">
            <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
        </a>
        <div class="topbar-right">
            <div class="user-badge">
                <span class="dot"></span>
                <span id="user-name">Administrador</span>
            </div>
            <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
    </header>

    <main class="page-wrapper">
        <div class="page-header">
            <a href="admin.html" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.88rem;font-weight:700;color:#2d65a0;text-decoration:none;margin-bottom:1rem;">← Volver al menú</a>
            <h1>Tiendas</h1>
            <p>Gestión de tiendas asociadas a cadenas de supermercados.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Listado de tiendas</h2>
                <div class="card-actions">
                    <button class="btn btn-primary" id="btn-nueva-tienda">+ Nueva tienda</button>
                </div>
            </div>

            <div class="filters-bar" id="filters-bar">
                <select id="filter-chain"><option value="">Todas las cadenas</option></select>
                <select id="filter-locality"><option value="">Todas las localidades</option></select>
                <select id="filter-zone"><option value="">Todas las zonas</option></select>
                <button id="btn-apply-filters">Filtrar</button>
                <button class="btn-clear" id="btn-clear-filters">Limpiar</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Domicilio</th>
                            <th>Localidad</th>
                            <th>CP</th>
                            <th>Zona</th>
                            <th>Cadena</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="stores-tbody">
                        <tr><td colspan="8" class="table-empty">Cargando tiendas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" style="max-width:520px;">
            <h3 id="modal-title">Nueva tienda</h3>

            <div class="form-group">
                <label for="input-nombre">Nombre <span style="color:red">*</span></label>
                <input type="text" id="input-nombre" placeholder="Nombre de la tienda" maxlength="255">
            </div>
            <div class="form-group">
                <label for="input-domicilio">Domicilio</label>
                <input type="text" id="input-domicilio" placeholder="Calle, número..." maxlength="500">
            </div>
            <div class="form-group">
                <label for="input-cp">Código postal</label>
                <input type="text" id="input-cp" placeholder="Ej: 28001" maxlength="5" pattern="[0-9]{5}">
            </div>
            <div class="form-group">
                <label for="input-chain">Cadena</label>
                <select id="input-chain">
                    <option value="">Sin cadena asignada</option>
                </select>
            </div>

            <p class="form-message" id="modal-error"></p>
            <div class="modal-footer">
                <button class="btn-cancel" id="btn-modal-cancel">Cancelar</button>
                <button class="btn btn-primary" id="btn-modal-save">Guardar</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
        const BACKEND = 'http://localhost:8080';

        function getToken() { return localStorage.getItem('token'); }
        function getUser()  { return localStorage.getItem('nombre') || 'Administrador'; }
        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
        }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        if (!getToken()) { window.location.href = 'login.html'; }
        document.getElementById('user-name').textContent = getUser();
        document.getElementById('btn-logout').addEventListener('click', logout);

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast toast-' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        function renderTable(stores) {
            const tbody = document.getElementById('stores-tbody');
            if (!stores.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="table-empty">No hay tiendas registradas.</td></tr>';
                return;
            }
            tbody.innerHTML = stores.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td><strong>${esc(s.name)}</strong></td>
                    <td>${esc(s.address || '—')}</td>
                    <td>${esc(s.locality || '—')}</td>
                    <td>${esc(s.postalCode || '—')}</td>
                    <td>${esc(s.zone || '—')}</td>
                    <td>${esc(s.chainName || '—')}</td>
                    <td>
                        <div class="td-actions">
                            <button class="btn btn-edit btn-sm" onclick="openEdit(${s.id})">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteStore(${s.id}, '${esc(s.name)}')">Eliminar</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        function esc(v) { return String(v ?? '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        // Cargar datos auxiliares
        let allChains    = [];
        let allLocalities = [];
        let allZones     = [];

        async function loadAuxData() {
            try {
                const res = await fetch(BACKEND + '/api/chains', { headers: authHeaders() });
                if (res.ok) {
                    allChains = await res.json();
                    // Poblar select cadenas del modal
                    const sel = document.getElementById('input-chain');
                    allChains.forEach(c => {
                        const o = document.createElement('option');
                        o.value = c.id; o.textContent = c.name;
                        sel.appendChild(o);
                    });
                    // Poblar filtro cadenas
                    const fc = document.getElementById('filter-chain');
                    allChains.forEach(c => {
                        const o = document.createElement('option');
                        o.value = c.id; o.textContent = c.name;
                        fc.appendChild(o);
                    });
                }
            } catch {}
        }

        async function loadStores() {
            const chainId    = document.getElementById('filter-chain').value;
            const localityId = document.getElementById('filter-locality').value;
            const zoneId     = document.getElementById('filter-zone').value;

            const params = new URLSearchParams();
            if (chainId)    params.append('chainId',    chainId);
            if (localityId) params.append('localityId', localityId);
            if (zoneId)     params.append('zoneId',     zoneId);

            const url = BACKEND + '/api/stores' + (params.toString() ? '?' + params : '');
            try {
                const res = await fetch(url, { headers: authHeaders() });
                if (res.status === 403) { logout(); return; }
                const data = await res.json();
                renderTable(data);
            } catch {
                document.getElementById('stores-tbody').innerHTML =
                    '<tr><td colspan="8" class="table-empty">Error al conectar con el servidor.</td></tr>';
            }
        }

        document.getElementById('btn-apply-filters').addEventListener('click', loadStores);
        document.getElementById('btn-clear-filters').addEventListener('click', () => {
            document.getElementById('filter-chain').value    = '';
            document.getElementById('filter-locality').value = '';
            document.getElementById('filter-zone').value    = '';
            loadStores();
        });

        let editingId = null;

        function openModal(title) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-error').textContent = '';
            document.getElementById('modal-backdrop').classList.add('open');
        }
        function closeModal() {
            document.getElementById('modal-backdrop').classList.remove('open');
            document.getElementById('input-nombre').value = '';
            document.getElementById('input-domicilio').value = '';
            document.getElementById('input-cp').value = '';
            document.getElementById('input-chain').value = '';
            document.getElementById('modal-error').textContent = '';
            editingId = null;
        }

        function openCreate() { editingId = null; openModal('Nueva tienda'); }

        async function openEdit(id) {
            try {
                const res = await fetch(BACKEND + '/api/stores/' + id, { headers: authHeaders() });
                if (!res.ok) { showToast('Error al cargar la tienda.', 'error'); return; }
                const s = await res.json();
                editingId = s.id;
                document.getElementById('input-nombre').value   = s.name    || '';
                document.getElementById('input-domicilio').value = s.address || '';
                document.getElementById('input-cp').value       = s.postalCode || '';
                document.getElementById('input-chain').value    = s.chainId  || '';
                openModal('Editar tienda');
            } catch { showToast('Error de conexión.', 'error'); }
        }

        document.getElementById('btn-nueva-tienda').addEventListener('click', openCreate);
        document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-backdrop').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-backdrop')) closeModal();
        });

        document.getElementById('btn-modal-save').addEventListener('click', async () => {
            const nombre    = document.getElementById('input-nombre').value.trim();
            const domicilio = document.getElementById('input-domicilio').value.trim();
            const cp        = document.getElementById('input-cp').value.trim();
            const chainId   = document.getElementById('input-chain').value;
            const errorEl   = document.getElementById('modal-error');

            if (!nombre) { errorEl.textContent = 'El nombre es obligatorio.'; return; }
            if (nombre.length > 255) { errorEl.textContent = 'El nombre no puede superar 255 caracteres.'; return; }
            if (cp && !/^\d{5}$/.test(cp)) { errorEl.textContent = 'El código postal debe tener exactamente 5 dígitos.'; return; }

            const body = JSON.stringify({
                name: nombre,
                address: domicilio || null,
                postalCode: cp || null,
                chainId: chainId ? parseInt(chainId) : null
            });
            const url    = editingId ? `${BACKEND}/api/stores/${editingId}` : `${BACKEND}/api/stores`;
            const method = editingId ? 'PUT' : 'POST';

            try {
                const res  = await fetch(url, { method, headers: authHeaders(), body });
                const data = await res.json();
                if (!res.ok) { errorEl.textContent = data.message || 'Error al guardar.'; return; }
                closeModal();
                showToast(editingId ? 'Tienda actualizada.' : 'Tienda creada.');
                loadStores();
            } catch { errorEl.textContent = 'Error de conexión con el servidor.'; }
        });

        async function deleteStore(id, nombre) {
            if (!confirm(`¿Eliminar la tienda "${nombre}"? Esta acción no se puede deshacer.`)) return;
            try {
                const res = await fetch(`${BACKEND}/api/stores/${id}`, {
                    method: 'DELETE', headers: authHeaders()
                });
                if (!res.ok) { const d = await res.json(); showToast(d.message || 'Error al eliminar.', 'error'); return; }
                showToast('Tienda eliminada.');
                loadStores();
            } catch { showToast('Error de conexión.', 'error'); }
        }

        loadAuxData();
        loadStores();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Ver Campañas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <script src="javascript/campanas.js" defer></script>
    <style>
        .chips-bar { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1.25rem; }
        .chip {
            padding:.45rem 1rem; border-radius:999px; border:1px solid var(--border);
            background:rgba(25,58,107,.07); font:inherit; font-size:.85rem; font-weight:700;
            color:var(--blue-900); cursor:pointer; transition:all .2s;
        }
        .chip:hover { background:rgba(25,58,107,.14); }
        .chip.chip-selected { background:linear-gradient(135deg,var(--blue-900),var(--blue-700)); color:#fff; border-color:transparent; }
        .filter-bar { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; font-size:.9rem; font-weight:600; }
        .filter-bar select {
            padding:.5rem .9rem; border:1px solid rgba(25,58,107,.18); border-radius:var(--radius-sm);
            font:inherit; font-size:.88rem; background:var(--surface); color:var(--ink); outline:none;
        }
        .badge-active { background:#dcfce7; color:#15803d; padding:.2rem .65rem; border-radius:999px; font-size:.8rem; font-weight:700; }
        .badge-future { background:#dbeafe; color:#1d4ed8; padding:.2rem .65rem; border-radius:999px; font-size:.8rem; font-weight:700; }
        .badge-past   { background:#f1f5f9; color:#64748b; padding:.2rem .65rem; border-radius:999px; font-size:.8rem; font-weight:700; }
        .pagination { display:flex; align-items:center; justify-content:center; gap:1rem; margin-top:1.25rem; }
        .pagination button {
            padding:.5rem 1rem; border:1px solid var(--border); border-radius:var(--radius-sm);
            background:transparent; font:inherit; font-size:.88rem; font-weight:700; cursor:pointer;
        }
        .pagination button:disabled { opacity:.4; cursor:not-allowed; }
        #page-info { font-size:.88rem; color:var(--ink-light); font-weight:600; }
    </style>
</head>
<body>

<header class="topbar">
    <a class="brand" href="index.html">
        <img src="assets/LOGO_BANCOSOL.png" alt="Bancosol" class="logo">
    </a>
    <div class="topbar-right">
        <div class="user-badge">
            <span class="dot"></span>
            <span id="user-name">Administrador</span>
        </div>
        <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
    </div>
</header>

<main class="page-wrapper">
    <div class="page-header">
        <a href="admin.html" class="back-link-inline">← Volver al panel</a>
        <h1>Campañas de recogida</h1>
        <p>Consulta el estado de todas las campañas de Bancosol.</p>
    </div>

    <div class="chips-bar">
        <button class="chip chip-selected" data-status="" id="chip-all">Todas</button>
        <button class="chip" data-status="ACTIVE"  id="chip-active">Activas: —</button>
        <button class="chip" data-status="FUTURE"  id="chip-future">Futuras: —</button>
        <button class="chip" data-status="PAST"    id="chip-past">Pasadas: —</button>
    </div>

    <div class="filter-bar">
        <label for="sort-select">Ordenar por:</label>
        <select id="sort-select">
            <option value="startDate,desc">Inicio (más reciente)</option>
            <option value="startDate,asc">Inicio (más antiguo)</option>
            <option value="name,asc">Nombre (A–Z)</option>
            <option value="name,desc">Nombre (Z–A)</option>
        </select>
    </div>

    <div class="card">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Inicio</th>
                        <th>Fin</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="campaigns-tbody">
                    <tr><td colspan="5" class="table-empty">Cargando campañas...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="pagination">
        <button id="btn-prev" disabled>← Anterior</button>
        <span id="page-info"></span>
        <button id="btn-next" disabled>Siguiente →</button>
    </div>
</main>

</body>
</html>

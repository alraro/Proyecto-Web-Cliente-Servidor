<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol | Entidades Socias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-partner-entities.css">
    <script src="javascript/includeHTML.js" defer></script>
    <script src="javascript/header.js" defer></script>

</head>
<body>

    <include-html src="header.html"></include-html>

    <main class="page-wrapper">
        <div class="page-header">
            <a href="admin.html" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.88rem;font-weight:700;color:var(--blue-700);text-decoration:none;margin-bottom:1rem;">← Volver al panel</a>
            <h1>Entidades Socias</h1>
            <p>Gestiona las entidades socias participantes en las campañas de Bancosol.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Listado de entidades socias</h2>
                <div class="card-actions">
                    <button class="btn btn-primary" id="btn-nueva">+ Nueva entidad socia</button>
                </div>
            </div>
            <!-- FILTROS -->
            <div class="filters-bar">
                <input type="text" id="filter-search" placeholder="Buscar por nombre..." class="filter-search">
                <select id="filter-sort-by">
                    <option value="id">Ordenar por ID</option>
                    <option value="name">Ordenar por Nombre</option>
                </select>
                <select id="filter-sort-order">
                    <option value="asc">Ascendente</option>
                    <option value="desc">Descendente</option>
                </select>
                <button id="btn-apply-filters">Filtrar</button>
                <button class="btn-clear" id="btn-clear-filters">Limpiar</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Dirección</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="partner-entities-tbody">
                        <tr><td colspan="5" class="table-empty">Cargando entidades socias...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="btn-prev-page" onclick="previousPage()">← Anterior</button>
                <span class="pagination-info">
                    Página <span id="current-page">1</span> de <span id="total-pages">1</span>
                </span>
                <button id="btn-next-page" onclick="nextPage()">Siguiente →</button>
                <select class="pagination-select" id="page-size-select" onchange="changePageSize()">
                    <option value="20">20 por página</option>
                    <option value="50">50 por página</option>
                    <option value="100">100 por página</option>
                </select>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h3 id="modal-title">Nueva entidad socia</h3>

            <div class="form-group">
                <label for="input-nombre">Nombre <span style="color:#dc2626">*</span></label>
                <input type="text" id="input-nombre" placeholder="Ej: BanCorp" maxlength="255">
            </div>
            <div class="form-group">
                <label for="input-direccion">Dirección</label>
                <input type="text" id="input-direccion" placeholder="Calle, número..." maxlength="500">
            </div>
            <div class="form-group">
                <label for="input-telefono">Teléfono</label>
                <input type="text" id="input-telefono" placeholder="Ej: +34 912345678" maxlength="20">
            </div>

            <p class="form-message" id="modal-error"></p>

            <div class="modal-footer">
                <button class="btn-cancel" id="btn-cancelar">Cancelar</button>
                <button class="btn btn-primary" id="btn-guardar">Guardar</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toast-container"></div>

    <script src="javascript/admin-partner-entities.js"></script>
</body>
</html>
